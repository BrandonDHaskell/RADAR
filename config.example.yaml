# Copy to ~/.config/radar/config.yaml (or point --config at your own copy).
# Secrets never go here; they come from the environment (see .env.example).

embedding:
  provider: voyage
  model: voyage-4
  dimension: 1024  # must match the model above and the posting_embeddings column

llm:
  provider: anthropic
  model: claude-haiku-4-5

match:
  llm_top_k: 40            # LLM verdicts per run, global across all boards
  min_semantic_score: 0.0  # optional floor; 0 disables
  triage:                  # optional local go/no-go tier, not yet implemented
    enabled: false
    endpoint: http://localhost:11434
    model: ""              # operator-chosen Ollama model tag (3B-8B instruct class)

digest:
  format: md
  limit: 10
  out_path: ~/radar-digest.md

schedule:
  sync_cron: "0 8 * * 6"   # Saturday 08:00
  digest_cron: "0 8 * * 1" # Monday 08:00

profile_path: ~/.config/radar/profile.json
